---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-kafka-ui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://ui.charts.kafbat.io/
      chart: kafka-ui
      targetRevision: 1.6.4
      helm:
        releaseName: kafka-ui
        valueFiles:
          - $values/gitops/apps/kafka-ui/values.yaml
    - repoURL: https://github.com/requset700k/Cledyu.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/requset700k/Cledyu.git
      targetRevision: main
      path: gitops/apps/kafka-ui
      directory:
        include: "certificate.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
