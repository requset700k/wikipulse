apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-web
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/requset700k/cledyu.git
    # main 브랜치만 감시 — feat/* 브랜치 머지 전에는 sync 안 됨
    targetRevision: main
    path: gitops/apps/web
    helm:
      releaseName: web
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
