---
# Strimzi Kafka Operator를 ArgoCD로 배포하는 Application 리소스
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-strimzi-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    # App 삭제 시 ArgoCD가 연관된 k8s 리소스까지 함께 정리
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # multi-source: Helm 차트 + values 파일 + namespace 선언을 별도 소스로 분리
  sources:
    # 1) Strimzi 공식 Helm 차트 (버전 고정)
    - repoURL: https://strimzi.io/charts/
      chart: strimzi-kafka-operator
      targetRevision: 0.43.0
      helm:
        releaseName: strimzi
        valueFiles:
          # $values ref를 통해 Git 레포의 values.yaml을 주입
          - $values/gitops/apps/strimzi-operator/values.yaml
    # 2) values.yaml을 제공하는 Git 레포 (ref: values로 참조)
    - repoURL: https://github.com/requset700k/cledyu.git
      targetRevision: main
      ref: values
    # 3) strimzi-system 네임스페이스 선언 매니페스트
    - repoURL: https://github.com/requset700k/cledyu.git
      targetRevision: main
      path: gitops/apps/strimzi-operator
      directory:
        include: namespace.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: strimzi-system
  syncPolicy:
    automated:
      prune: true      # Git에서 삭제된 리소스는 클러스터에서도 제거
      selfHeal: true   # 클러스터 상태가 Git과 벗어나면 자동 복구
    syncOptions:
      - CreateNamespace=true   # strimzi-system 네임스페이스 자동 생성
      - ServerSideApply=true   # CRD 등 대형 리소스의 annotation 초과 문제 방지
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2        # 재시도마다 대기 시간을 2배씩 증가
        maxDuration: 3m
  # Strimzi CRD는 최초 설치 후 .status와 .spec.preserveUnknownFields에 diff가 쌓인다.
  # 이를 무시하지 않으면 app이 영구적으로 OutOfSync 상태가 된다.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
        - /status
