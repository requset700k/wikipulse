---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-kafka-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/requset700k/cledyu.git
    targetRevision: main
    path: gitops/apps/kafka-cluster
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    # KafkaNodePool / Kafka / KafkaTopic CRD는 data-strimzi-operator가 설치한다.
    # 최초 sync 시 CRD 전파 지연을 흡수하기 위해 retry 횟수를 높게 설정한다.
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
