---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-kafka-cluster
  namespace: argocd
  annotations:
    # data-strimzi-operator(wave 0)가 CRD를 설치한 뒤 이 App이 sync되도록 순서 명시.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/requset700k/cledyu.git
    targetRevision: main
    path: gitops/apps/kafka-cluster
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    # KafkaNodePool / Kafka / KafkaTopic CRD는 data-strimzi-operator가 설치한다.
    # 최초 sync 시 CRD 전파 지연을 흡수하기 위해 retry 횟수를 높게 설정한다.
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  # Kafka / KafkaTopic CR의 .status 필드는 Strimzi가 런타임에 계속 업데이트한다.
  # Git에 없는 필드라 ArgoCD가 OutOfSync로 잘못 감지하는 노이즈를 제거한다.
  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaTopic
      jsonPointers:
        - /status
