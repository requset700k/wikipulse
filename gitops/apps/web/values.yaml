image:
  repository: ghcr.io/requset700k/web
  # main 머지 시 build-web.yml 이 latest + sha-<short> 태그로 push.
  # 운영 환경에서는 sha-<short> 태그로 고정 권장.
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 3000

ingress:
  host: app.cledyu.local
  tlsSecret: web-tls

env:
  # Keycloak 미연동 상태이므로 false. Keycloak 연동 PR에서 true로 전환.
  AUTH_ENABLED: "false"
  # 백엔드 미배포 상태이므로 placeholder. Session API PR에서 실제 주소로 교체.
  BACKEND_URL: "http://cledyu-api.api.svc.cluster.local:8080"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
