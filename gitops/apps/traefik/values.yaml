---
deployment:
  replicas: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: false
    ingressClass: traefik
  kubernetesIngress:
    enabled: true
    ingressClass: traefik
    publishedService:
      enabled: true

additionalArguments:
  - --entryPoints.web.forwardedHeaders.trustedIPs=10.10.0.0/24,100.64.0.0/10
  - --entryPoints.websecure.forwardedHeaders.trustedIPs=10.10.0.0/24,100.64.0.0/10

gateway:
  enabled: false

gatewayClass:
  enabled: false

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: false
  healthcheck:
    enabled: false

ports:
  web:
    port: 8000
    exposedPort: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 8443
    exposedPort: 443
    http:
      tls:
        enabled: true

service:
  type: LoadBalancer
  annotations:
    metallb.io/loadBalancerIPs: "10.10.0.101"
  spec:
    externalTrafficPolicy: Local

logs:
  general:
    format: json
    level: INFO
  access:
    enabled: true
    format: json

metrics:
  prometheus:
    enabled: true
    service:
      enabled: true
    serviceMonitor:
      enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: traefik

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

podSecurityContext:
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault
