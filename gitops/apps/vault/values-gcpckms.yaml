---
# GCP Cloud KMS auto-unseal — migration 단계 values.
# values.yaml 위에 override (server.ha.raft.config 통째 교체).
#
# extraArgs="-migrate" 는 Shamir → gcpckms 전환 시 first apply 에만 필요.
# Migration 완료 후 별도 PR 로 -migrate 제거 후 helm sync.
#
# 적용된 GCP 자원:
#   project    = cledyu-project
#   region     = asia-northeast3
#   key_ring   = cledyu-vault-keyring
#   crypto_key = vault-unseal-key
#   SA         = vault-unseal-sa@cledyu-project.iam.gserviceaccount.com
#   k8s Secret = vault-gcp-kms-creds (kubectl 로 직접 생성, ESO 도입 후 마이그레이션)
# 기본 PR1 배포에는 적용하지 않는다.
# 실제 전환 시 아래 값을 환경에 맞게 채운 뒤 values.yaml 의
# server.ha.raft.config 에 seal "gcpckms" 블록을 반영한다.
#
# 필요한 선행 작업:
# - GCP KMS key ring / crypto key 생성
# - Vault Pod가 KMS decrypt/encrypt 권한을 갖도록 Workload Identity 또는
#   별도 credential secret 구성
# - 기존 Shamir unseal key / root token 1Password 보관 완료
# - 변경 전 스냅샷 및 롤백 절차 확인

server:
  extraEnvironmentVars:
    GOOGLE_APPLICATION_CREDENTIALS: /vault/userconfig/gcp-kms/key.json

  volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls
    - name: gcp-kms
      secret:
        secretName: vault-gcp-kms-creds

  volumeMounts:
    - name: vault-tls
      mountPath: /vault/tls
      readOnly: true
    - name: gcp-kms
      mountPath: /vault/userconfig/gcp-kms
      readOnly: true

  ha:
    enabled: true
    raft:
      enabled: true
      config: |
        ui = true
        # Keep aligned with base values.yaml: restricted PSA drops CAP_IPC_LOCK, so mlock is disabled.
        # This assumes Kubernetes nodes run with swap disabled.
        disable_mlock = true

        seal "gcpckms" {
          project    = "cledyu-project"
          region     = "asia-northeast3"
          key_ring   = "cledyu-vault-keyring"
          crypto_key = "vault-unseal-key"
        }

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = 0
          tls_cert_file = "/vault/tls/tls.crt"
          tls_key_file = "/vault/tls/tls.key"
          tls_client_ca_file = "/vault/tls/ca.crt"

          # Keep aligned with base values.yaml so KMS overlay does not drop metrics behavior.
          # Revisit when ServiceMonitor scraping uses authenticated access or a dedicated metrics listener.
          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }

          retry_join {
            leader_api_addr = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }

          retry_join {
            leader_api_addr = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }
