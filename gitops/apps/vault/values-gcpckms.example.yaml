---
# GCP Cloud KMS auto-unseal 전환용 예시 values.
# 기본 PR1 배포에는 적용하지 않는다.
# 실제 전환 시 아래 값을 환경에 맞게 채운 뒤 values.yaml 의
# server.ha.raft.config 에 seal "gcpckms" 블록을 반영한다.
#
# 필요한 선행 작업:
# - GCP KMS key ring / crypto key 생성
# - Vault Pod가 KMS decrypt/encrypt 권한을 갖도록 Workload Identity 또는
#   별도 credential secret 구성
# - 기존 Shamir unseal key / root token 1Password 보관 완료
# - 변경 전 스냅샷 및 롤백 절차 확인

server:
  extraEnvironmentVars:
    GOOGLE_APPLICATION_CREDENTIALS: /vault/userconfig/gcp-kms/key.json

  volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls
    - name: gcp-kms
      secret:
        secretName: vault-gcp-kms

  volumeMounts:
    - name: vault-tls
      mountPath: /vault/tls
      readOnly: true
    - name: gcp-kms
      mountPath: /vault/userconfig/gcp-kms
      readOnly: true

  ha:
    raft:
      config: |
        ui = true
        disable_mlock = true

        seal "gcpckms" {
          project    = "REPLACE_WITH_GCP_PROJECT_ID"
          region     = "global"
          key_ring   = "REPLACE_WITH_KEY_RING"
          crypto_key = "REPLACE_WITH_CRYPTO_KEY"
        }

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = 0
          tls_cert_file = "/vault/tls/tls.crt"
          tls_key_file = "/vault/tls/tls.key"
          tls_client_ca_file = "/vault/tls/ca.crt"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }

          retry_join {
            leader_api_addr = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }

          retry_join {
            leader_api_addr = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
          }
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }
