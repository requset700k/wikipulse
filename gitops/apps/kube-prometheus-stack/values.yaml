fullnameOverride: kps

# ── Prometheus ────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 10d
    retentionSize: "18GB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn # Grafana 영속화를 위해 longhorn 스토리지 클래스 사용
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containers:
      - name: prometheus
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

# ── Alertmanager ─────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn # Alertmanager 영속화를 위해 longhorn 스토리지 클래스 사용
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containers:
      - name: alertmanager
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

# ── Grafana ───────────────────────────────────────────────────
grafana:
  initChownData:
    enabled: false
  persistence:
    enabled: true
    storageClassName: longhorn # Grafana 영속화를 위해 longhorn 스토리지 클래스 사용
    size: 5Gi

  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  extraVolumes:
    - name: tmp
      emptyDir: {}

  ingress: # Grafana Ingress 설정
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "cledyu-ca"
    hosts:
      - grafana.cledyu.local
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.cledyu.local

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── node-exporter ─────────────────────────────────────────────
prometheus-node-exporter:
  hostNetwork: false # 노드의 실제 IP 메트릭이나 호스트 레벨의 상세 네트워크 통계가 필요하게 된다면 true 변경 필요
  hostPID: false

  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

