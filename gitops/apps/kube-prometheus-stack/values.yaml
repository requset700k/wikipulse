fullnameOverride: kps

# ── Prometheus ────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 10d
    retentionSize: "18GB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn # Grafana 영속화를 위해 longhorn 스토리지 클래스 사용
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containers:
      - name: prometheus
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

# ── Alertmanager ─────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn # Alertmanager 영속화를 위해 longhorn 스토리지 클래스 사용
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault

    containers:
      - name: alertmanager
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

    secrets:
      - alertmanager-discord-webhook

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ["namespace", "alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "discord"
      routes:
        - matchers:
            - alertname = "Watchdog" # Watchdog 알림 무시 설정
          receiver: "null"

    receivers:
      - name: "null"
      - name: "discord"
        webhook_configs:
          - url: "http://alertmanager-discord-proxy:9094"
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["namespace", "alertname"] # critical 알림이 있을 때 중복 알림 방지

# ── Grafana ───────────────────────────────────────────────────
grafana:
  deploymentStrategy:
    type: RollingUpdate

  initChownData:
    enabled: false
  persistence:
    enabled: true
    storageClassName: longhorn # Grafana 영속화를 위해 longhorn 스토리지 클래스 사용
    size: 5Gi

  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: cledyu-ca
      mountPath: /etc/ssl/cledyu
      readOnly: true
  extraVolumes:
    - name: tmp
      emptyDir: {}
    - name: cledyu-ca
      configMap:
        name: cledyu-root-ca-bundle

  # ── Keycloak OIDC ──
  # client_secret 은 env var (GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET) 로 덮어쓴다.
  # Secret grafana-oidc(client-secret 키) 를 monitoring namespace 에 미리 생성해야 한다.
  grafana.ini:
    server:
      root_url: "https://grafana.cledyu.local"
    auth:
      disable_login_form: "false"
    auth.generic_oauth:
      enabled: "true"
      name: Keycloak
      allow_sign_up: "true"
      auto_login: "false"
      client_id: grafana
      client_secret: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
      scopes: "openid profile email"
      auth_url: https://keycloak.cledyu.local/realms/cledyu/protocol/openid-connect/auth
      token_url: https://keycloak.cledyu.local/realms/cledyu/protocol/openid-connect/token
      tls_client_ca: /etc/ssl/cledyu/ca.crt
      api_url: https://keycloak.cledyu.local/realms/cledyu/protocol/openid-connect/userinfo
      sign_out_redirect_url: "https://keycloak.cledyu.local/realms/cledyu/protocol/openid-connect/logout?client_id=grafana&post_logout_redirect_uri=https://grafana.cledyu.local/"
      role_attribute_path: "contains(groups[*], 'team-observability') && 'Admin' || contains(groups[*], 'team-platform') && 'Admin' || 'Viewer'"
      empty_scopes: "false"
      use_pkce: "true"

  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc
        key: client-secret

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: "cledyu-ca"
    hosts:
      - grafana.cledyu.local
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.cledyu.local

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── node-exporter ─────────────────────────────────────────────
prometheus-node-exporter:
  hostNetwork: false # 노드의 실제 IP 메트릭이나 호스트 레벨의 상세 네트워크 통계가 필요하게 된다면 true 변경 필요
  hostPID: true

  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

