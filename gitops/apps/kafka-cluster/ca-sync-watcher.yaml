---
# ca-sync-watcher: trust-manager Bundle ConfigMap 변경 감지 → CA Secret 자동 재동기화.
#
# cert-manager가 cluster CA / root CA를 갱신하면:
#   1. trust-manager Bundle이 cledyu-root-ca-bundle ConfigMap을 자동 업데이트
#   2. watcher가 ConfigMap 해시 변경을 감지
#   3. ca-secret-sync와 동일한 변환 로직을 직접 실행 → Strimzi Secret에 새 체인 반영
#
# ArgoCD Sync hook(ca-secret-sync Job)은 최초 배포 시에만 실행되므로
# CA rotate 이후 자동 반영을 위해 이 watcher가 필요

# 전용 서비스 계정 생성
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-ca-sync-watcher
  namespace: kafka
---
# 필요한 권한 정의 (Role)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-ca-sync-watcher
  namespace: kafka
rules:
  # ConfigMap watch — trust-manager Bundle 변경 감지(ConfigMap 감시)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cledyu-root-ca-bundle"]
    verbs: ["get", "list", "watch"]
  # cert-manager 가 생성한 intermediate CA Secret을 읽을 수 있는 권한
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - kafka-cluster-ca-cm
      - kafka-clients-ca-cm
    verbs: ["get"]
  # Strimzi가 참조하는 Secret을 생성/수정할 수 있는 권한
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - cledyu-kafka-cluster-ca
      - cledyu-kafka-cluster-ca-cert
      - cledyu-kafka-clients-ca
      - cledyu-kafka-clients-ca-cert
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-ca-sync-watcher
  namespace: kafka
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-ca-sync-watcher
subjects:
  - kind: ServiceAccount
    name: kafka-ca-sync-watcher
    namespace: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ca-sync-watcher
  namespace: kafka
  annotations:
    # ArgoCD 배포 순서 조절 (Operator 배포 후 실행되도록 설정)
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-ca-sync-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-ca-sync-watcher
    spec:
      serviceAccountName: kafka-ca-sync-watcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: root-ca-bundle
          configMap:
            name: cledyu-root-ca-bundle
      containers:
        - name: watcher
          image: alpine/k8s:1.31.4@sha256:9c4976d47656d78cf53a92b0203fc54ac45eae18a2b45001ac221c27da4c8036
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: root-ca-bundle
              mountPath: /etc/ssl/cledyu-root-ca
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              run_sync() {
                echo "[ca-sync-watcher] CA Secret 동기화 시작"

                # trust-manager가 마운트한 ConfigMap에서 root CA 공개 인증서만 읽음
                # (private key는 없고 public cert만 있음)
                cp /etc/ssl/cledyu-root-ca/ca.crt /tmp/root-ca.crt

                # cert-manager가 만든 cluster intermediate CA Secret에서 키/인증서 추출
                # tls.key → ca.key, tls.crt + root CA → ca.crt (전체 체인)
                # Strimzi는 openssl verify로 전체 체인을 검증하기 때문에 root까지 붙여야 함
                kubectl get secret kafka-cluster-ca-cm -n kafka \
                  -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/cluster-ca.key
                kubectl get secret kafka-cluster-ca-cm -n kafka \
                  -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/cluster-ca.crt
                cat /tmp/root-ca.crt >> /tmp/cluster-ca.crt

                # Strimzi가 기대하는 형식으로 Secret 생성/업데이트
                # dry-run으로 yaml 생성 → label 붙여서 apply (idempotent)
                kubectl create secret generic cledyu-kafka-cluster-ca \
                  --from-file=ca.key=/tmp/cluster-ca.key \
                  --namespace kafka --dry-run=client -o yaml \
                  | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                  | kubectl apply -f -

                kubectl create secret generic cledyu-kafka-cluster-ca-cert \
                  --from-file=ca.crt=/tmp/cluster-ca.crt \
                  --namespace kafka --dry-run=client -o yaml \
                  | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                  | kubectl apply -f -

                # clients intermediate CA도 동일한 방식으로 처리
                kubectl get secret kafka-clients-ca-cm -n kafka \
                  -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/clients-ca.key
                kubectl get secret kafka-clients-ca-cm -n kafka \
                  -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/clients-ca.crt
                cat /tmp/root-ca.crt >> /tmp/clients-ca.crt

                kubectl create secret generic cledyu-kafka-clients-ca \
                  --from-file=ca.key=/tmp/clients-ca.key \
                  --namespace kafka --dry-run=client -o yaml \
                  | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                  | kubectl apply -f -

                kubectl create secret generic cledyu-kafka-clients-ca-cert \
                  --from-file=ca.crt=/tmp/clients-ca.crt \
                  --namespace kafka --dry-run=client -o yaml \
                  | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                  | kubectl apply -f -

                echo "[ca-sync-watcher] CA Secret 동기화 완료"
                # 민감한 키 파일은 즉시 삭제 (tmpfs라 재시작 시 자동 소멸되지만 명시적으로 정리)
                rm -f /tmp/cluster-ca.key /tmp/cluster-ca.crt /tmp/clients-ca.key /tmp/clients-ca.crt /tmp/root-ca.crt
              }

              # 시작 시점의 ConfigMap 해시를 기준값으로 저장
              LAST_HASH=$(cat /etc/ssl/cledyu-root-ca/ca.crt | sha256sum | cut -d' ' -f1)
              echo "[ca-sync-watcher] 시작. 초기 ConfigMap 해시: $LAST_HASH"

              while true; do
                sleep 60

                # 60초마다 현재 ConfigMap 해시와 비교
                CURRENT_HASH=$(cat /etc/ssl/cledyu-root-ca/ca.crt | sha256sum | cut -d' ' -f1)

                if [ "$CURRENT_HASH" != "$LAST_HASH" ]; then
                  # 해시가 달라지면 trust-manager가 CA 갱신을 반영한 것 → 동기화 실행
                  echo "[ca-sync-watcher] ConfigMap 변경 감지: $LAST_HASH → $CURRENT_HASH"
                  if run_sync; then
                    LAST_HASH="$CURRENT_HASH"
                  else
                    # sync 실패 시 재시작 없이 다음 루프에서 재시도
                    echo "[ca-sync-watcher] 동기화 실패 — 60초 후 재시도"
                  fi
                fi
              done
