---
# cert-manager Secret 키 이름 변환 Job에 필요한 RBAC.
# cert-manager가 만든 Secret(tls.key/tls.crt)을
# Strimzi가 기대하는 형식(ca.key/ca.crt)으로 복사하는 Job이 이 권한을 사용한다.
# ca.crt는 kafka-cluster-ca + intermediate + root 전체 체인을 포함한다.
# Strimzi 브로커 시작 스크립트가 openssl verify로 체인 전체를 검증하기 때문이다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-ca-sync
subjects:
  - kind: ServiceAccount
    name: kafka-ca-sync
    namespace: kafka
---
# cert-manager 네임스페이스의 루트 CA Secret을 읽기 위한 ClusterRole.
# Strimzi는 openssl verify로 전체 체인(kafka CA → intermediate → root)을 검증하므로
# 루트 CA cert가 ca.crt 체인에 포함돼야 한다.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kafka-ca-sync-root-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cledyu-root-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kafka-ca-sync-root-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kafka-ca-sync-root-reader
subjects:
  - kind: ServiceAccount
    name: kafka-ca-sync
    namespace: kafka
---
# cert-manager Secret → Strimzi Secret 변환 Job.
# cert-manager가 생성한 kafka-cluster-ca-cm / kafka-clients-ca-cm Secret의
# 키 이름(tls.key → ca.key, tls.crt → ca.crt)을 변환해서
# Strimzi가 읽을 수 있는 cledyu-kafka-cluster-ca / cledyu-kafka-clients-ca Secret을 생성한다.
# Kafka CR(sync-wave: "1")이 적용되기 전에 반드시 완료돼야 한다.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-ca-secret-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: kafka-ca-sync
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: sync
          image: alpine/k8s:1.31.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # cert-manager Secret이 준비될 때까지 대기 (cert 발급에 수 초 소요)
              echo "cert-manager Secret 대기 중..."
              until kubectl get secret kafka-cluster-ca-cm -n kafka >/dev/null 2>&1; do
                sleep 3
              done
              until kubectl get secret kafka-clients-ca-cm -n kafka >/dev/null 2>&1; do
                sleep 3
              done
              echo "cert-manager Secret 준비 완료"

              # 루트 CA cert 추출 (cert-manager 네임스페이스)
              # Strimzi 브로커가 openssl verify로 전체 체인을 검증하므로 루트까지 포함해야 한다.
              kubectl get secret cledyu-root-ca -n cert-manager \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/root-ca.crt

              # cluster CA: tls.key → ca.key, tls.crt + root → ca.crt (전체 체인)
              kubectl get secret kafka-cluster-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/cluster-ca.key
              kubectl get secret kafka-cluster-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/cluster-ca.crt
              cat /tmp/root-ca.crt >> /tmp/cluster-ca.crt

              kubectl create secret generic cledyu-kafka-cluster-ca \
                --from-file=ca.key=/tmp/cluster-ca.key \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              kubectl create secret generic cledyu-kafka-cluster-ca-cert \
                --from-file=ca.crt=/tmp/cluster-ca.crt \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              # clients CA: tls.key → ca.key, tls.crt + root → ca.crt (전체 체인)
              kubectl get secret kafka-clients-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/clients-ca.key
              kubectl get secret kafka-clients-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/clients-ca.crt
              cat /tmp/root-ca.crt >> /tmp/clients-ca.crt

              kubectl create secret generic cledyu-kafka-clients-ca \
                --from-file=ca.key=/tmp/clients-ca.key \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              kubectl create secret generic cledyu-kafka-clients-ca-cert \
                --from-file=ca.crt=/tmp/clients-ca.crt \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              echo "CA Secret 변환 완료 (전체 체인 포함)"
