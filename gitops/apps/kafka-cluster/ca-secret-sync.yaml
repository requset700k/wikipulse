---
# cert-manager Secret 키 이름 변환 Job에 필요한 RBAC.
# cert-manager가 만든 Secret(tls.key/tls.crt)을
# Strimzi가 기대하는 형식(ca.key/ca.crt)으로 복사하는 Job이 이 권한을 사용한다.
# ca.crt는 kafka-cluster-ca + intermediate + root 전체 체인을 포함한다.
# Strimzi 브로커 시작 스크립트가 openssl verify로 체인 전체를 검증하기 때문이다.
#
# Root CA public cert 는 trust-manager Bundle (cledyu-root-ca-bundle) 이 분배한
# kafka namespace 의 ConfigMap 에서 read — cross-namespace Secret read 패턴 폐기.
# (윤승호 PR #20 코드 리뷰: root CA private key 가 kafka SA 에 노출되는 구조 차단)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  # cert-manager 가 발급한 두 intermediate Secret read.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - kafka-cluster-ca-cm
      - kafka-clients-ca-cm
    verbs: ["get"]
  # Strimzi 가 기대하는 4 개 Secret 만 create/update/patch (label 포함).
  # resourceNames 는 create verb 에는 적용 안 되지만 update/patch 는 명시 효과.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - cledyu-kafka-cluster-ca
      - cledyu-kafka-cluster-ca-cert
      - cledyu-kafka-clients-ca
      - cledyu-kafka-clients-ca-cert
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-ca-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-ca-sync
subjects:
  - kind: ServiceAccount
    name: kafka-ca-sync
    namespace: kafka
---
# cert-manager Secret → Strimzi Secret 변환 Job.
# Root CA public cert 는 trust-manager Bundle 이 만든 ConfigMap 에서 read
# (cross-namespace Secret read 폐기 — root CA private key 노출 차단).
#
# Kafka CR(sync-wave: "1")이 적용되기 전에 반드시 완료돼야 한다.
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-ca-secret-sync
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300   # cert-manager 의 Certificate 가 5분 안에 발급 안 되면 fail-fast
  template:
    spec:
      serviceAccountName: kafka-ca-sync
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory   # private key 가 평문으로 노드 디스크에 기록되지 않게 tmpfs (RAM)
            sizeLimit: 10Mi
        - name: root-ca-bundle
          configMap:
            name: cledyu-root-ca-bundle   # trust-manager Bundle 이 분배한 ConfigMap
      containers:
        - name: sync
          image: alpine/k8s:1.31.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: root-ca-bundle
              mountPath: /etc/ssl/cledyu-root-ca
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # cert-manager Secret이 준비될 때까지 대기 (cert 발급에 수 초 소요)
              echo "cert-manager Secret 대기 중..."
              until kubectl get secret kafka-cluster-ca-cm -n kafka >/dev/null 2>&1; do
                sleep 3
              done
              until kubectl get secret kafka-clients-ca-cm -n kafka >/dev/null 2>&1; do
                sleep 3
              done
              echo "cert-manager Secret 준비 완료"

              # Root CA public cert — trust-manager Bundle 이 mount 한 ConfigMap 에서 read.
              # 이전 패턴 (kubectl -n cert-manager get secret cledyu-root-ca) 폐기.
              # 이 파일에는 public cert 만 있고 private key 는 없음.
              cp /etc/ssl/cledyu-root-ca/ca.crt /tmp/root-ca.crt

              # cluster CA: tls.key → ca.key, tls.crt + root → ca.crt (전체 체인)
              kubectl get secret kafka-cluster-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/cluster-ca.key
              kubectl get secret kafka-cluster-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/cluster-ca.crt
              cat /tmp/root-ca.crt >> /tmp/cluster-ca.crt

              kubectl create secret generic cledyu-kafka-cluster-ca \
                --from-file=ca.key=/tmp/cluster-ca.key \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              kubectl create secret generic cledyu-kafka-cluster-ca-cert \
                --from-file=ca.crt=/tmp/cluster-ca.crt \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              # clients CA: tls.key → ca.key, tls.crt + root → ca.crt (전체 체인)
              kubectl get secret kafka-clients-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.key}' | base64 -d > /tmp/clients-ca.key
              kubectl get secret kafka-clients-ca-cm -n kafka \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/clients-ca.crt
              cat /tmp/root-ca.crt >> /tmp/clients-ca.crt

              kubectl create secret generic cledyu-kafka-clients-ca \
                --from-file=ca.key=/tmp/clients-ca.key \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              kubectl create secret generic cledyu-kafka-clients-ca-cert \
                --from-file=ca.crt=/tmp/clients-ca.crt \
                --namespace kafka --dry-run=client -o yaml \
                | kubectl label --local -f - strimzi.io/kind=Kafka strimzi.io/cluster=cledyu-kafka --dry-run=client -o yaml \
                | kubectl apply -f -

              echo "CA Secret 변환 완료 (전체 체인 포함, root CA public cert 는 Bundle ConfigMap 에서 read)"
