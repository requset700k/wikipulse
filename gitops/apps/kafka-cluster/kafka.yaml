---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: cledyu-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
    # ca-secret-sync Job(wave 0)이 끝난 뒤 Kafka CR이 적용돼야 한다.
    argocd.argoproj.io/sync-wave: "1"
spec:
  # cert-manager cledyu-ca로 서명된 CA를 직접 사용한다.
  # ca-secret-sync Job이 cert-manager Secret을 Strimzi 형식으로 변환해서 미리 생성해준다.
  clusterCa:
    generateCertificateAuthority: false
    renewalDays: 30
  clientsCa:
    generateCertificateAuthority: false
    renewalDays: 30
  kafka:
    version: 3.8.0
    # metadataVersion은 KRaft 메타데이터 프로토콜 버전을 고정한다.
    # 모든 브로커가 3.8.0으로 올라온 뒤 상향 조정한다.
    # KRaft 모드에서는 log.message.format.version, inter.broker.protocol.version 사용 금지.
    metadataVersion: "3.8-IV0"

    listeners:
      # plain: 인증서 관리가 불필요한 클러스터 내부 클라이언트용 (개발 도구 등).
      - name: plain
        port: 9092
        type: internal
        tls: false
        networkPolicyPeers:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kafka
      # tls: mTLS 클라이언트용 — Validation Engine, 분석 파이프라인.
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls

    config:
      # 복제 안전성: 내부 토픽과 사용자 토픽 모두 RF=3 기본값 적용.
      offsets.topic.replication.factor: "3"
      transaction.state.log.replication.factor: "3"
      transaction.state.log.min.isr: "2"
      default.replication.factor: "3"
      min.insync.replicas: "2"
      # 기본 로그 보존 기간 — 개별 토픽은 KafkaTopic CR에서 덮어쓴다.
      log.retention.hours: "168"

  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    userOperator:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    # kafka 네임스페이스 PSA restricted 적용을 위해 entity operator Pod에 securityContext 명시.
    template:
      pod:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      topicOperatorContainer:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      userOperatorContainer:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
