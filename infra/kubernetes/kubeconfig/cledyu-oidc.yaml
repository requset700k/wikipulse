---
# Cledyu kubeconfig — 5명 팀원 공유용 (sensitive 없음, git commit OK).
# 사전: brew install int128/kubelogin/kubelogin
# 사용: KUBECONFIG=$(pwd)/infra/kubernetes/kubeconfig/cledyu-oidc.yaml kubectl get nodes

apiVersion: v1
kind: Config
clusters:
  - name: cledyu
    cluster:
      server: https://10.10.0.10:6443
      certificate-authority-data: 
contexts:
  - name: cledyu
    context:
      cluster: cledyu
      user: keycloak
current-context: cledyu
users:
  - name: keycloak
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1
        command: kubectl-oidc_login
        interactiveMode: IfAvailable
        provideClusterInfo: false
        args:
          - get-token
          - --oidc-issuer-url=https://keycloak.cledyu.local/realms/cledyu
          - --oidc-client-id=kubectl
          - --oidc-extra-scope=email
          - --oidc-extra-scope=profile
          - --certificate-authority=/Users/kylekim1223/request700k/cledyu/infra/kubernetes/kubeconfig/cledyu-root-ca.pem
        installHint: |
          kubectl-oidc_login (kubelogin) 미설치.
          macOS:  brew install int128/kubelogin/kubelogin
          Linux:  https://github.com/int128/kubelogin/releases
