apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-discord-proxy
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-discord-proxy
  template:
    metadata:
      labels:
        app: alertmanager-discord-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: discord-proxy
          image: rogerrum/alertmanager-discord:1.0.4
          env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: alertmanager-discord-webhook
                  key: webhook-url
            - name: DISCORD_USERNAME
              value: "Alertmanager"
          ports:
            - containerPort: 9094
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-discord-proxy
  namespace: monitoring
spec:
  selector:
    app: alertmanager-discord-proxy
  ports:
    - port: 9094
      targetPort: 9094
