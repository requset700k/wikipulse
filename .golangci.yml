# cledyu Go 모듈 공용 linter 설정.
# 적용 범위: apps/<service>/ 하위의 모든 Go 모듈 (go.mod 단위로 자동 감지).
# 호출 경로: pre-commit local hook + .github/workflows/go-lint.yml.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # 정확성
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    # 위생/스타일
    - misspell
    - unconvert
    - revive
    # 보안
    - gosec
    # 자원/리소스
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
  settings:
    gosec:
      excludes:
        - G104  # 미처리 에러는 errcheck 가 더 정밀
    revive:
      rules:
        - { name: var-naming }
        - { name: error-return }
        - { name: error-strings }
        - { name: error-naming }
        - { name: receiver-naming }
        - { name: indent-error-flow }
        - { name: superfluous-else }
        - { name: empty-block }
        - { name: range }
        - { name: increment-decrement }

formatters:
  enable:
    - gofmt
    - goimports
