# repo-root ansible.cfg
# pre-commit / ansible-lint 가 cwd=repo-root 로 동작할 때 roles_path 를 찾도록
# 두는 얇은 진입점. 실제 플레이북 실행용 설정은 ansible/ansible.cfg 에 남아 있고,
# 여기 키는 ansible-lint 의 role 탐색 경로만 해결하기 위한 최소 집합이다.
#
# 주의: ansible 은 ansible.cfg 의 경로를 "cfg 파일 위치 기준" 상대경로로 해석한다.
# (ANSIBLE_CONFIG: https://docs.ansible.com/ansible/latest/reference_appendices/config.html)
# 따라서 여기서의 roles_path=ansible/roles 는 repo-root 기준 ansible/roles 로 해석된다.
[defaults]
roles_path = ansible/roles
# collections_path 는 일부러 설정하지 않음 → 기본값(~/.ansible/collections)
# 을 그대로 써서 ansible-galaxy collection install 이 설치한 위치가 자동 탐색됨.
interpreter_python = auto_silent
