# Ansible configuration (single source of truth)
# 모든 ansible 명령은 repo root 에서 실행한다 (Makefile, CI, 개발자 로컬).
# 이 파일 하나에서 inventory / roles / collections / ssh / privilege 설정을
# 관리하므로 ansible-lint, ansible-playbook, ansible-galaxy 가 동일한 cfg 를 본다.
#
# 경로는 ansible 이 "cfg 파일 위치 기준" 상대경로로 해석하므로 여기서의
# "ansible/roles" 는 언제나 repo-root 기준 ansible/roles 로 풀린다.
#
# ANSIBLE_CONFIG: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
[defaults]
inventory = ansible/inventory.yml
roles_path = ansible/roles
collections_path = ansible/collections:~/.ansible/collections
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
callbacks_enabled = timer, profile_tasks
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
become = True
become_method = sudo
become_user = root
