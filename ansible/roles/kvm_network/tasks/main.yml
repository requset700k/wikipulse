---
# cledyubr0 이라는 NAT 기반 libvirt 네트워크 생성.
# DHCP 는 끄고 Terraform이 cloud-init 으로 고정 IP를 주입한다.

- name: libvirt 네트워크 정의 XML 생성
  ansible.builtin.copy:
    dest: /tmp/{{ br_name }}-net.xml
    mode: "0644"
    content: |
      <network>
        <name>{{ br_name }}</name>
        <forward mode='nat'/>
        <bridge name='{{ br_name }}' stp='on' delay='0'/>
        <ip address='{{ br_gateway }}' netmask='255.255.255.0'>
          <!-- DHCP 비활성: Terraform/cloud-init 으로 고정 IP 주입 -->
        </ip>
      </network>

- name: 기존 libvirt 네트워크 여부 확인
  ansible.builtin.command: virsh net-info {{ br_name }}
  register: br_info
  changed_when: false
  failed_when: false

- name: libvirt 네트워크 정의
  ansible.builtin.command: virsh net-define /tmp/{{ br_name }}-net.xml
  when: br_info.rc != 0

- name: libvirt 네트워크 자동 시작 + 활성화
  ansible.builtin.shell: |
    set -e
    virsh net-autostart {{ br_name }} || true
    virsh net-start     {{ br_name }} || true
  args:
    executable: /bin/bash
  register: net_start
  changed_when: "'started' in net_start.stdout or 'marked as autostarted' in net_start.stdout"

- name: IP 포워딩 활성화(지속)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true
