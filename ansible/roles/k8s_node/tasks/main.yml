---
# containerd + kubeadm/kubelet/kubectl 사전 설치 + 커널/네트워크 튜닝.
# K8s v1.31 기준.

- name: 스왑 비활성화 (현재 세션)
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: /etc/fstab 에서 스왑 라인 주석 처리
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: 커널 모듈 로드 (overlay, br_netfilter)
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: 커널 모듈 즉시 적재
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: sysctl(K8s 네트워크) 설정
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
  notify: reload-sysctl

- name: 필수 패키지 설치
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - socat
      - conntrack
      - ebtables
      - ethtool
    state: present
    update_cache: true

- name: containerd 저장소 GPG 키
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: containerd APT 저장소 등록
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker-ce
    state: present

- name: containerd 설치
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true

- name: containerd 기본 config.toml 생성
  ansible.builtin.shell: |
    set -e
    mkdir -p /etc/containerd
    containerd config default > /etc/containerd/config.toml
  args:
    executable: /bin/bash
    creates: /etc/containerd/config.toml

- name: containerd SystemdCgroup=true 로 전환
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart-containerd

- name: Kubernetes v1.31 저장소 GPG 키
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"
    force: true

- name: Kubernetes v1.31 APT 저장소 등록
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc]
      https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /
    filename: kubernetes
    state: present

- name: kubelet/kubeadm/kubectl 설치
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true

- name: kubelet/kubeadm/kubectl hold (자동 업그레이드 방지)
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: kubelet 활성화(부트스트랩 전 대기 상태)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
