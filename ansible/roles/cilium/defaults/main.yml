---
# Cilium CNI (CNI-only, kube-proxy replacement) 기본값
# kubeadm init 시 skip-phases=addon/kube-proxy 로 kube-proxy 를 스킵했기 때문에
# Cilium 이 반드시 kube-proxy replacement 모드로 떠야 ServiceClusterIP 가 동작한다.

cilium_chart_version: "1.16.5"
cilium_namespace: kube-system
cilium_release_name: cilium

# kubeadm-config 의 pod/service CIDR 과 일치해야 함
cilium_pod_cidr: "10.42.0.0/16"
cilium_service_cidr: "10.43.0.0/16"

# k8sServiceHost/Port — kube-proxy 를 쓰지 않으므로 Cilium 이 apiserver 에 직접 연결.
# VIP 를 지정해야 리더 CP 가 failover 돼도 새 리더로 붙는다.
cilium_k8s_service_host: "10.10.0.10"
cilium_k8s_service_port: 6443

cilium_cluster_name: wikipulse

# control-plane taint 해제 여부 (3노드를 워커 겸용으로 사용)
cilium_untaint_control_plane: true
