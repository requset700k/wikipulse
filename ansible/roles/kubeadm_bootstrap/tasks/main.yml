---
# Phase 2: kubeadm HA 컨트롤플레인 부트스트랩
# - 첫 번째 CP (groups.control_plane[0]): kubeadm init
# - 나머지 CP: kubeadm join --control-plane
# - kube-vip 매니페스트는 이미 kube_vip 역할에서 배치됨 (init/join 전)

- name: 이미 클러스터에 가입했는지 확인
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: 첫 번째 CP 에만 kubeadm-config 배치
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /root/kubeadm-config.yaml
    mode: "0600"
  when:
    - inventory_hostname == groups.control_plane[0]
    - not kubelet_conf.stat.exists

- name: kubeadm 컨트롤플레인 이미지 사전 풀(첫 번째 CP)
  ansible.builtin.command: kubeadm config images pull --kubernetes-version v{{ kubernetes_version }}
  when:
    - inventory_hostname == groups.control_plane[0]
    - not kubelet_conf.stat.exists
  changed_when: true

- name: kubeadm init 실행 (첫 번째 CP)
  ansible.builtin.command: >-
    kubeadm init
    --config=/root/kubeadm-config.yaml
    --upload-certs
    --skip-phases={{ skip_phases }}
  when:
    - inventory_hostname == groups.control_plane[0]
    - not kubelet_conf.stat.exists
  register: kubeadm_init
  changed_when: true

- name: 워커 조인 커맨드 생성
  ansible.builtin.command: kubeadm token create --print-join-command
  when: inventory_hostname == groups.control_plane[0]
  register: worker_join
  changed_when: false

- name: 컨트롤플레인 조인용 certificate-key 재업로드
  ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
  when: inventory_hostname == groups.control_plane[0]
  register: cp_cert_key
  changed_when: false

- name: CP 조인 커맨드 합성
  ansible.builtin.set_fact:
    cp_join_command: >-
      {{ hostvars[groups.control_plane[0]].worker_join.stdout }}
      --control-plane
      --certificate-key {{ hostvars[groups.control_plane[0]].cp_cert_key.stdout_lines[-1] }}
      --apiserver-advertise-address {{ ansible_facts.default_ipv4.address }}
  when: inventory_hostname != groups.control_plane[0]

- name: 이미지 사전 풀 (나머지 CP)
  ansible.builtin.command: kubeadm config images pull --kubernetes-version v{{ kubernetes_version }}
  when:
    - inventory_hostname != groups.control_plane[0]
    - not kubelet_conf.stat.exists
  changed_when: true

- name: kubeadm join --control-plane (나머지 CP)
  ansible.builtin.command: "{{ cp_join_command }}"
  when:
    - inventory_hostname != groups.control_plane[0]
    - not kubelet_conf.stat.exists
  register: kubeadm_join
  changed_when: true

# kubectl 편의 설정
- name: ubuntu 홈에 .kube 디렉토리
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: admin.conf 를 ubuntu 홈으로 복사
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"
    remote_src: true

- name: admin.conf 를 로컬(리포 루트) 로 fetch
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/../../kubeconfig"
    flat: true
  when: inventory_hostname == groups.control_plane[0]
