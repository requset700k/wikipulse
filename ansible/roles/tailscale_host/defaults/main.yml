---
# Tailscale subnet router 기본값.
# 호스트(hv01)가 VM 서브넷을 tailnet 에 광고해 운영자 laptop 에서
# 10.10.0.x (API VIP, 노드 IP, MetalLB LB IP) 직접 접근 가능하게 만든다.

tailscale_hostname: request700k-host

# 광고할 서브넷 목록. cledyubr0 (10.10.0.0/24) 만 내보내면 VM/VIP/LB IP 접근 가능.
# pod/service CIDR 은 호스트에서 라우팅 불가 — 필요 시 in-cluster subnet router 별도 구축.
tailscale_advertised_routes:
  - "10.10.0.0/24"

# 호스트는 tailnet 의 DNS 를 받지 않음 (로컬 DNS 유지)
tailscale_accept_dns: false

# 피어가 광고한 라우트를 받아들일지 여부 — 호스트가 다른 subnet 에 접근 필요 없으므로 off
tailscale_accept_routes: false

# authkey 는 command-line (-e) 으로만 주입. repo 에는 절대 저장하지 않음.
tailscale_authkey: ""
