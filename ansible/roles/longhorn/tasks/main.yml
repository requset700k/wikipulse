---
# Longhorn 설치 — cp01 에서 helm 으로 배포.
# 전제: longhorn_prereq 역할이 모든 노드에 open-iscsi/nfs-common 설치 완료.

- name: Longhorn helm repo 등록
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Longhorn values.yaml 템플릿 렌더
  ansible.builtin.template:
    src: values.yaml.j2
    dest: /home/ubuntu/longhorn-values.yaml
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Longhorn helm install/upgrade
  kubernetes.core.helm:
    name: "{{ longhorn_release_name }}"
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_chart_version }}"
    release_namespace: "{{ longhorn_namespace }}"
    create_namespace: true
    values_files:
      - /home/ubuntu/longhorn-values.yaml
    wait: true
    wait_timeout: 15m
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: longhorn-manager DaemonSet rollout 대기
  ansible.builtin.command: >-
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    -n {{ longhorn_namespace }}
    rollout status ds/longhorn-manager --timeout=10m
  changed_when: false
  become_user: ubuntu

- name: Longhorn StorageClass 존재 확인
  ansible.builtin.command: >-
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    get storageclass longhorn -o jsonpath='{.metadata.annotations.storageclass\.kubernetes\.io/is-default-class}'
  register: sc_default
  changed_when: false
  become_user: ubuntu
