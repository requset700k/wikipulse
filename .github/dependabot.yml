version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    labels: ["type:chore", "area:ci", "deps"]
    commit-message:
      prefix: "ci(deps)"
    open-pull-requests-limit: 5

  # Terraform - onprem
  - package-ecosystem: terraform
    directory: /infra/terraform/envs/onprem
    schedule:
      interval: weekly
    labels: ["type:chore", "area:infra", "deps"]
    commit-message:
      prefix: "chore(terraform)"

  - package-ecosystem: terraform
    directory: /infra/terraform/kvm
    schedule:
      interval: weekly
    labels: ["type:chore", "area:infra", "deps"]
    commit-message:
      prefix: "chore(terraform)"

  # Python (pyproject.toml / requirements.txt 감지)
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels: ["type:chore", "area:data", "area:ai", "deps"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  # Node / Next.js (서비스 디렉토리 추가 시 자동 감지)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels: ["type:chore", "area:service", "deps"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # Docker (Dockerfile 추가 시)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels: ["type:chore", "area:infra", "deps"]
    commit-message:
      prefix: "chore(docker)"
