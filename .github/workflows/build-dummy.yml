name: build-dummy

# Reusable build-image workflow 의 첫 사용자 + GHCR public pull 동작 smoke test.
# 신규 서비스 caller workflow 의 참고 템플릿이기도 함 (docs/RUNBOOK/container-image.md).

on:
  pull_request:
    branches: [main]
    paths:
      - apps/dummy/**
      - .github/workflows/build-image.yml
      - .github/workflows/build-dummy.yml
  push:
    branches: [main]
    paths:
      - apps/dummy/**
      - .github/workflows/build-image.yml
      - .github/workflows/build-dummy.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    uses: ./.github/workflows/build-image.yml
    with:
      context: apps/dummy
      image-name: dummy
    secrets: inherit
