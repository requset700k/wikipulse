---
# CodeQL (~15분): AST 기반 심층 보안 분석. PR 마다 돌리면 개발 흐름을 막아
# main 머지 + 주간 스케줄로만 실행. 취약점은 매일 새로 생기지 않음.
#
# 초기 단계 — Python/JS 소스는 아직 없음. 'actions' 언어로 GitHub Workflow
# 보안(secret 유출, third-party action 위험 등)만 검사. 소스 들어오면 matrix
# 에 python / javascript-typescript 를 추가한다.
name: codeql

on:
  push:
    branches: [main]
  schedule:
    # 매주 월요일 03:00 UTC (KST 월요일 12:00)
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
