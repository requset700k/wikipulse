name: build-web

# build-image.yml 재사용 caller.
# 빌드 정책은 build-image.yml 에 위임:
#   PR      → build only (push X, Trivy X)
#   main    → build + push(GHCR) + Trivy HIGH/CRITICAL 게이트
#
# 첫 main 머지 후 GHCR 패키지(web)가 private 으로 생성됨.
# imagePullSecret 없이 쓰려면 한 번만 수동으로 public 전환 필요
# (Settings → Packages → web → Change visibility).

on:
  pull_request:
    branches: [main]
    paths:
      - apps/web/**
      - .github/workflows/build-image.yml
      - .github/workflows/build-web.yml
  push:
    branches: [main]
    paths:
      - apps/web/**
      - .github/workflows/build-image.yml
      - .github/workflows/build-web.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    uses: ./.github/workflows/build-image.yml
    with:
      context: apps/web
      image-name: web
      trivyignores: apps/web/.trivyignore
    secrets: inherit
