---
# Fast feedback (~10s): Python / JS-TS 소스가 바뀐 PR 에서만 Ruff + ESLint.
# 경로 필터가 맞는 변경이 없으면 workflow 자체가 뜨지 않아 runner 비용 0.
# (lint.yml 의 pre-commit 은 ruff 를 SKIP 해 ci-lint 와 중복 실행을 피한다.)
name: ci-lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - '**/requirements*.txt'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '.github/workflows/ci-lint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/pyproject.toml'
      - '**/requirements*.txt'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '.github/workflows/ci-lint.yml'
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: ruff (python lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Ruff
        run: pip install 'ruff==0.7.4'

      - name: ruff check
        run: ruff check --output-format=github .

      - name: ruff format (check)
        run: ruff format --check --diff .

  eslint:
    name: eslint (js/ts lint)
    runs-on: ubuntu-latest
    # hashFiles() 는 job-level if 에서 평가 불가 → step-level 에서 우회.
    # 프론트엔드 스캐폴드(package.json) 가 들어오기 전에는 이후 step 들이 skip.
    steps:
      - uses: actions/checkout@v4

      - name: Detect pnpm-lock.yaml
        id: pkg
        run: |
          set -euo pipefail
          if git ls-files '**/pnpm-lock.yaml' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No pnpm-lock.yaml — eslint steps will be skipped."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.pkg.outputs.found == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.pkg.outputs.found == 'true'
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install deps
        if: steps.pkg.outputs.found == 'true'
        run: |
          for dir in $(git ls-files '**/pnpm-lock.yaml' | sed 's|/pnpm-lock.yaml||'); do
            pnpm install --frozen-lockfile --dir "$dir"
          done

      - name: Run ESLint
        if: steps.pkg.outputs.found == 'true'
        run: |
          for dir in $(git ls-files '**/pnpm-lock.yaml' | sed 's|/pnpm-lock.yaml||'); do
            pnpm --dir "$dir" run lint --if-present
          done
