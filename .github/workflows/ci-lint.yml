---
# Fast feedback (~10s): 모든 PR/푸시에서 Ruff + ESLint.
# 무거운 보안 스캔은 codeql.yml / image-scan.yml 로 분리되어 개발 흐름을 막지 않음.
name: ci-lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: ruff (python lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Ruff
        run: pip install 'ruff==0.7.4'

      - name: ruff check
        run: ruff check --output-format=github .

      - name: ruff format (check)
        run: ruff format --check --diff .

  eslint:
    name: eslint (js/ts lint)
    runs-on: ubuntu-latest
    # 프론트엔드 스캐폴드가 들어오기 전(package.json 미존재)에는 skip.
    if: hashFiles('**/package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint --if-present
