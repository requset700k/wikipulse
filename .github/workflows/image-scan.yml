---
# Trivy 이미지 스캔 (~3분): Dockerfile/의존성 파일이 바뀐 PR 에서만 트리거.
# 일반 PR 에서는 전혀 돌지 않아 피드백 속도가 유지된다.
name: image-scan

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/requirements*.txt'
      - '**/pyproject.toml'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/poetry.lock'
      - '.github/workflows/image-scan.yml'
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/requirements*.txt'
      - '**/pyproject.toml'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/poetry.lock'
      - '.github/workflows/image-scan.yml'
  workflow_dispatch:

concurrency:
  group: image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  discover:
    name: discover dockerfiles
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.find.outputs.any }}
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Enumerate Dockerfiles
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '**/Dockerfile' '**/Dockerfile.*' 2>/dev/null || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo 'dockerfiles=[]' >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles tracked; scan jobs will be skipped."
          else
            json=$(printf '%s\n' "${files[@]}" | jq -R . | jq -sc .)
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "dockerfiles=$json" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${files[@]}"
          fi

  trivy:
    name: trivy (${{ matrix.dockerfile }})
    needs: discover
    if: needs.discover.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: ctx
        name: Resolve build context + tag
        run: |
          set -euo pipefail
          dir=$(dirname "${{ matrix.dockerfile }}")
          [ "$dir" = "." ] && dir=""
          slug=$(echo "${dir:-root}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "context=${dir:-.}" >> "$GITHUB_OUTPUT"
          echo "tag=cledyu-${slug}:ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.ctx.outputs.tag }}

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ctx.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.dockerfile }}
