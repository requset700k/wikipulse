---
# 인프라 품질 게이트: pre-commit 전체 훅을 하나의 job 에서 실행.
# ruff/ruff-format 은 ci-lint.yml 의 독립 job 이 담당하므로 SKIP 으로 제외해
# CI 총 러닝타임에서 중복을 없앤다. terraform/gitleaks/yamllint/ansible-lint/
# kubeconform(+CRD-aware datreeio catalog)/shellcheck/markdownlint/prettier 는
# 모두 pre-commit 훅으로 일원화 (kubeconform 은 local hook + 시스템 바이너리).
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (all hooks, ruff skipped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          # ansible-lint v25 계열은 python_spec='python3.13' 을 요구해서
          # pre-commit 가상환경 생성이 3.11 에서는 실패한다.
          python-version: '3.13'
          cache: pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install shfmt
        run: |
          sudo curl -sSLo /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt

      - name: Install tflint
        # pre-commit-terraform 의 terraform_tflint 훅은 tflint 바이너리 필요.
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1

      - name: Install terraform-docs
        # terraform_docs 훅은 terraform-docs 바이너리 필요.
        run: |
          VERSION=v0.19.0
          sudo curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://terraform-docs.io/dl/${VERSION}/terraform-docs-${VERSION}-linux-amd64.tar.gz"
          sudo tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
          sudo chmod +x /usr/local/bin/terraform-docs

      - name: Install kubeconform
        # pre-commit 의 local hook (entry: kubeconform) 이 시스템 바이너리 사용.
        run: |
          VERSION=v0.6.7
          curl -sSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${VERSION}/kubeconform-linux-amd64.tar.gz"
          sudo tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          sudo chmod +x /usr/local/bin/kubeconform

      - name: Install ansible-core and collections
        # ansible-lint 는 모듈 경로를 해석할 때 ~/.ansible/collections 를 탐색.
        # kubernetes.core / community.general / ansible.posix 를 미리 깔아두지
        # 않으면 syntax-check[unknown-module] 로 실패한다.
        # (pre-commit 가상환경은 격리되지만 ANSIBLE_COLLECTIONS_PATH 기본값은 공유.)
        run: |
          pip install 'ansible-core>=2.17'
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (skip ruff, delegated to ci-lint.yml)
        # PR: base..HEAD 변경 파일만 검사 → 기존 레거시 위반이 신규 PR 을 막지 않음.
        # main push / workflow_dispatch: --all-files 로 전체 품질 게이트 유지.
        env:
          SKIP: ruff,ruff-format
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            pre-commit run \
              --from-ref "origin/${{ github.base_ref }}" \
              --to-ref HEAD \
              --show-diff-on-failure
          else
            pre-commit run --all-files --show-diff-on-failure
          fi
