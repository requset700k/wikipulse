---
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Install shfmt
        run: |
          sudo curl -sSLo /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  terraform-validate:
    name: terraform validate (${{ matrix.dir }})
    runs-on: ubuntu-latest
    # hashFiles() 는 job-level if 에서 평가 불가 → 내부 step 의
    # `check directory exists` 로 디렉토리 단위 skip 처리.
    strategy:
      fail-fast: false
      matrix:
        dir:
          - infra/terraform/envs/onprem
          - infra/terraform/kvm
    steps:
      - uses: actions/checkout@v4
      - name: check directory exists
        id: check
        run: |
          if [ -d "${{ matrix.dir }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.check.outputs.exists == 'true'
        with:
          terraform_version: 1.9.8
      - name: fmt -check
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir=${{ matrix.dir }} fmt -check -recursive
      - name: init -backend=false
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir=${{ matrix.dir }} init -backend=false
      - name: validate
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir=${{ matrix.dir }} validate

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
