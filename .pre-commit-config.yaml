# pre-commit: 모든 PR 이전 로컬/CI에서 실행되는 품질 게이트
# 설치: pipx install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
# 전체 실행: pre-commit run -a
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # 1) 기본 위생 (모든 파일)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(ansible/|infra/terraform/.*\.tfvars\.example$|gitops/apps/.*/templates/)
      - id: check-json
        exclude: tsconfig\.json$
      - id: check-toml

  # 2) 시크릿 스캔
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # 3) YAML (run through UTF-8 mode so Windows locales do not break Korean docs/comments)
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: python -X utf8 -m yamllint
        language: python
        additional_dependencies: [yamllint==1.35.1]
        args: [-c=.yamllint.yml]
        types: [yaml]

  # 4) Terraform (portable wrapper avoids WSL bash vs Windows path issues)
  - repo: local
    hooks:
      - id: terraform_fmt
        name: Terraform fmt
        entry: python scripts/precommit_terraform.py fmt
        language: system
        files: ^infra/terraform/.*\.(tf|tfvars|tfvars\.example)$
        require_serial: true
      - id: terraform_validate
        name: Terraform validate
        entry: python scripts/precommit_terraform.py validate
        language: system
        files: ^infra/terraform/.*\.(tf|tfvars|tfvars\.example)$
        require_serial: true
      - id: terraform_tflint
        name: Terraform tflint
        entry: python scripts/precommit_terraform.py tflint
        language: system
        files: ^infra/terraform/.*\.(tf|tfvars|tfvars\.example)$
        require_serial: true
      - id: terraform_docs
        name: Terraform docs
        entry: python scripts/precommit_terraform.py docs
        language: system
        files: ^infra/terraform/.*\.(tf|tfvars|tfvars\.example)$
        require_serial: true

  # 5.5) Kubernetes manifests (CRD-aware, datreeio CRDs catalog)
  # KubeVirt / CDI / Traefik / cert-manager / ArgoCD CRD 들도 검증됨.
  # yannh/kubeconform repo 자체엔 .pre-commit-hooks.yaml 이 없어 local hook +
  # 시스템 kubeconform 바이너리 패턴. CI 러너에는 lint.yml 이 별도 설치 step 보유.
  # values.yaml / Chart.yaml / kustomization.yaml 같은 helm/kustomize 입력파일은 제외.
  - repo: local
    hooks:
      - id: kubeconform
        name: kubeconform (CRD-aware via datreeio catalog)
        entry: kubeconform
        language: system
        files: ^(gitops/|infra/kubernetes/).*\.ya?ml$
        exclude: (values[^/]*\.ya?ml|Chart\.ya?ml|kustomization\.ya?ml|/templates/)
        args:
          - -ignore-missing-schemas
          - -schema-location
          - default
          - -schema-location
          - https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
          - -summary

  # 6) Ansible
  # 루트 ansible.cfg (roles_path=ansible/roles) 가 없으면 ansible-lint 가
  # <playbook_dir>/roles 만 뒤져서 syntax-check 에서 "role not found" 실패.
  - repo: https://github.com/ansible/ansible-lint
    rev: v25.12.2
    hooks:
      - id: ansible-lint
        files: ^ansible/.*\.(yaml|yml)$
        always_run: false
        args: [ansible/]

  # 6.5) Go (apps/<svc> 안의 Go 모듈 단위로 golangci-lint).
  # CI 러너에는 lint.yml 이 시스템 바이너리 설치 step 보유.
  # 모듈이 없으면 entry 가 즉시 종료 → no-op.
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint (per Go module)
        entry: bash -c 'command -v golangci-lint >/dev/null 2>&1 || { echo "golangci-lint not installed locally — skipping (CI 의 lint.yml 이 설치 step 보유)"; exit 0; }; mods=$(find apps -name go.mod -printf "%h\n" 2>/dev/null); [ -z "$mods" ] && exit 0; for d in $mods; do (cd "$d" && golangci-lint run --timeout=5m) || exit 1; done'
        language: system
        files: '^apps/.*\.go$|^apps/.*/go\.(mod|sum)$|^\.golangci\.yml$'
        pass_filenames: false

  # 7) Shell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: [-i, '2', -ci, -sr, -w]

  # 8) Python (데이터 / AI / 백엔드)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 9) Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml]

  # 10) Prettier (JSON / JS / TS / Next.js / YAML 대안)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, scss]
        additional_dependencies:
          - prettier@3.3.3

  # 11) 커밋 메시지: Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - docs
          - test
          - chore
          - ci
          - build
          - revert
          - security
