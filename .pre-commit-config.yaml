# pre-commit: 모든 PR 이전 로컬/CI에서 실행되는 품질 게이트
# 설치: pipx install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
# 전체 실행: pre-commit run -a
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # 1) 기본 위생 (모든 파일)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(ansible/|infra/terraform/.*\.tfvars\.example$)
      - id: check-json
      - id: check-toml

  # 2) 시크릿 스캔
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # 3) YAML (Ansible / K8s / GitHub Actions / Helm)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # 4) Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args: [--hook-config=--retry-once-with-cleanup=true]
      - id: terraform_tflint
        args: [--args=--minimum-failure-severity=warning]
      - id: terraform_docs
        args: [--args=--config=.terraform-docs.yml]

  # 5.5) Kubernetes manifests (CRD-aware, datreeio CRDs catalog)
  # KubeVirt / CDI / Traefik / cert-manager / ArgoCD CRD 들도 검증됨.
  # yannh/kubeconform repo 자체엔 .pre-commit-hooks.yaml 이 없어 local hook +
  # 시스템 kubeconform 바이너리 패턴. CI 러너에는 lint.yml 이 별도 설치 step 보유.
  # values.yaml / Chart.yaml / kustomization.yaml 같은 helm/kustomize 입력파일은 제외.
  - repo: local
    hooks:
      - id: kubeconform
        name: kubeconform (CRD-aware via datreeio catalog)
        entry: kubeconform
        language: system
        files: ^(gitops/|infra/kubernetes/).*\.ya?ml$
        exclude: (values\.ya?ml|Chart\.ya?ml|kustomization\.ya?ml)$
        args:
          - -ignore-missing-schemas
          - -schema-location
          - default
          - -schema-location
          - https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
          - -summary

  # 6) Ansible
  # 루트 ansible.cfg (roles_path=ansible/roles) 가 없으면 ansible-lint 가
  # <playbook_dir>/roles 만 뒤져서 syntax-check 에서 "role not found" 실패.
  - repo: https://github.com/ansible/ansible-lint
    rev: v25.12.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        args: [ansible/]

  # 7) Shell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: [-i, '2', -ci, -sr, -w]

  # 8) Python (데이터 / AI / 백엔드)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 9) Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml]

  # 10) Prettier (JSON / JS / TS / Next.js / YAML 대안)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, scss]
        additional_dependencies:
          - prettier@3.3.3

  # 11) 커밋 메시지: Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - docs
          - test
          - chore
          - ci
          - build
          - revert
          - security
