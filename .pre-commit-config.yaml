# pre-commit: 모든 PR 이전 로컬/CI에서 실행되는 품질 게이트
# 설치: pipx install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
# 전체 실행: pre-commit run -a
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # 1) 기본 위생 (모든 파일)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^(ansible/|infra/terraform/.*\.tfvars\.example$)
      - id: check-json
      - id: check-toml

  # 2) 시크릿 스캔
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # 3) YAML (Ansible / K8s / GitHub Actions / Helm)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # 4) Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args: [--hook-config=--retry-once-with-cleanup=true]
      - id: terraform_tflint
        args: [--args=--minimum-failure-severity=warning]
      - id: terraform_docs
        args: [--args=--config=.terraform-docs.yml]

  # 5) Ansible
  - repo: https://github.com/ansible/ansible-lint
    rev: v25.12.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        args: [ansible/]

  # 6) Shell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
      - id: shfmt
        args: [-i, '2', -ci, -sr, -w]

  # 7) Python (데이터 / AI / 백엔드)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 8) Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml]

  # 9) Prettier (JSON / JS / TS / Next.js / YAML 대안)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, scss]
        additional_dependencies:
          - prettier@3.3.3

  # 10) Kubernetes 매니페스트 (kubeconform: API 스키마 검증)
  - repo: https://github.com/yannh/kubeconform
    rev: v0.6.7
    hooks:
      - id: kubeconform
        args: [-strict, -ignore-missing-schemas, -summary]
        files: ^infra/kubernetes/.*\.(yaml|yml)$

  # 11) 커밋 메시지: Conventional Commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - docs
          - test
          - chore
          - ci
          - build
          - revert
          - security
