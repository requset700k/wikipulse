---
# yamllint: Ansible / K8s 매니페스트 / Helm values / GitHub Actions 공통
extends: default

rules:
  line-length:
    max: 140
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start:
    present: true
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false   # GitHub Actions 'on:' 키 허용
  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: false

ignore: |
  .venv/
  node_modules/
  infra/terraform/**/.terraform/
  **/charts/*/templates/
  **/vendor/
  ansible/.omc/
