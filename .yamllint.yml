---
# yamllint: shared rules for Ansible, Kubernetes, Helm values, and GitHub Actions.
extends: default

rules:
  line-length:
    max: 140
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start:
    present: true
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false   # Allow GitHub Actions "on:".
  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

ignore: |
  .venv/
  .ansible/
  .pre-commit-cache*/
  node_modules/
  infra/terraform/**/.terraform/
  **/charts/*/templates/
  gitops/apps/*/templates/
  **/vendor/
  ansible/.omc/
  apps/web/pnpm-lock.yaml
